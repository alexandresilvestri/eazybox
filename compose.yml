services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: development
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://eazybox@db:5432/eazybox
      BINDING: "0.0.0.0"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    tty: true
    command: ["bin/dev"]

  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      db:
        condition: service_healthy
    environment:
      RAILS_ENV: test
      RAILS_MASTER_KEY: ${RAILS_MASTER_KEY}
      DATABASE_URL: postgres://eazybox@db:5432/eazybox_test
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    profiles:
      - test
    command: ["bin/rails", "test"]

  db:
    image: postgres:17
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: eazybox
      POSTGRES_DB: eazybox
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eazybox"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  bundle_cache:
