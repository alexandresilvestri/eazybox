version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://neon:npg@db:5432/?sslmode=no-verify
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - db

  db:
    image: neondatabase/neon_local:latest
    ports:
      - "5432:5432"
    environment:
      - NEON_API_KEY=${NEON_API_KEY}
      - NEON_PROJECT_ID=${NEON_PROJECT_ID}